<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Zerox — eCommerce Growth Partner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        display: ['Bricolage Grotesque', 'sans-serif'],
        body: ['Plus Jakarta Sans', 'sans-serif'],
      },
      colors: {
        sky: { brand: '#00AEF7', dim: 'rgba(0,174,247,0.12)', glow: 'rgba(0,174,247,0.28)' },
        ink: { DEFAULT: '#0A0A0A', 2: '#2D2D2D', 3: '#4A5568', 4: '#8896A5', 5: '#C4CDD6' },
        paper: { DEFAULT: '#FAFAFA', white: '#FFFFFF', warm: '#FDFBF7' },
        rule: '#EEEEEE',
      },
      animation: {
        'fade-up': 'fadeUp 0.6s ease both',
        'blob': 'blob 14s ease-in-out infinite',
        'float': 'float 6s ease-in-out infinite',
        'ticker': 'ticker 22s linear infinite',
      },
      keyframes: {
        fadeUp: { from: { opacity: '0', transform: 'translateY(24px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
        blob: {
          '0%,100%': { borderRadius: '60% 40% 54% 46%/48% 56% 44% 52%', transform: 'translate(0,0) scale(1)' },
          '50%': { borderRadius: '45% 55% 40% 60%/60% 40% 58% 42%', transform: 'translate(16px,-18px) scale(1.04)' },
        },
        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
        ticker: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } },
      },
    }
  }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FAFAFA; color: #0A0A0A; overflow-x: hidden; }
  h1,h2,h3,h4 { font-family: 'Bricolage Grotesque', sans-serif; }
  ::selection { background: rgba(135,206,235,0.28); }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #FAFAFA; }
  ::-webkit-scrollbar-thumb { background: #C4CDD6; border-radius: 4px; }

  .fade-section { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
  .fade-section.visible { opacity: 1; transform: none; }
  .fade-section.d1 { transition-delay: 0.08s; }
  .fade-section.d2 { transition-delay: 0.16s; }
  .fade-section.d3 { transition-delay: 0.24s; }
  .fade-section.d4 { transition-delay: 0.32s; }

  /* Hero headline word reveal */
  .word { display: inline-block; opacity: 0; transform: translateY(16px); transition: opacity 0.4s ease, transform 0.4s ease; }
  .word.show { opacity: 1; transform: none; }

  /* Sky underline */
  .sky-underline { position: relative; display: inline; }
  .sky-underline::after {
    content: '';
    position: absolute; bottom: -3px; left: 0; right: 0; height: 3px;
    background: #00AEF7; border-radius: 2px; opacity: 0.7;
    transform: scaleX(0); transform-origin: left;
    transition: transform 1s cubic-bezier(.4,0,.2,1) 0.8s;
  }
  .sky-underline.drawn::after { transform: scaleX(1); }

  /* Card hover */
  .service-card { transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease; }
  .service-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(135,206,235,0.18); border-color: rgba(135,206,235,0.45) !important; }

  .import-row { transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease; }
  .import-row:hover { transform: translateX(6px); background: #fff !important; border-color: rgba(135,206,235,0.3) !important; }

  .why-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
  .why-card:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(135,206,235,0.12); }

  .bento-tile { transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease; }
  .bento-tile:hover { transform: scale(1.015); box-shadow: 0 10px 36px rgba(135,206,235,0.12); border-color: rgba(135,206,235,0.35) !important; }

  /* Tweaks */
  #tweak-panel { display: none; position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: #fff; border: 1px solid #eee; border-radius: 16px; padding: 20px; width: 232px; box-shadow: 0 16px 48px rgba(0,0,0,0.10); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; }
  #tweak-panel.open { display: block; }
  #tweak-panel h4 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 14px; margin-bottom: 16px; color: #0A0A0A; }
  .tr { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
  .tr label { color: #4A5568; font-size: 12px; }
  .tr input[type=color] { width: 100%; height: 30px; border: 1px solid #eee; border-radius: 6px; cursor: pointer; padding: 2px; }
  .tr select { background: #fafafa; color: #0A0A0A; border: 1px solid #eee; border-radius: 6px; padding: 6px 8px; font-size: 12px; width: 100%; }
  .tr input[type=range] { width: 100%; accent-color: #00AEF7; }
  .ttog { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .ttog label { color: #4A5568; font-size: 12px; }
  .ttog input { accent-color: #00AEF7; }

  @media (max-width: 768px) {
    .nav-links { display: none !important; }
    .hamburger { display: flex !important; }
    .bento-grid { grid-template-columns: 1fr !important; }
    .bento-grid > div { grid-column: span 1 !important; }
    .import-layout { grid-template-columns: 1fr !important; gap: 40px !important; }
    .footer-cols { grid-template-columns: 1fr 1fr !important; }
    .hero-floats { display: none !important; }
  }
  @media (max-width: 480px) {
    .footer-cols { grid-template-columns: 1fr !important; }
    .stats-row { flex-direction: column; gap: 20px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="tweak-panel">
  <h4>Tweaks</h4>
  <div class="tr"><label>Accent color</label><input type="color" id="tw-accent" value="#00AEF7"/></div>
  <div class="tr"><label>Hero size</label><input type="range" id="tw-hs" min="40" max="88" value="68"/></div>
  <div class="tr"><label>Card radius</label><input type="range" id="tw-cr" min="4" max="24" value="12"/></div>
  <div class="tr"><label>Nav style</label><select id="tw-nav"><option value="glass">Glass blur</option><option value="solid">Solid white</option><option value="minimal">Minimal</option></select></div>
  <div class="ttog"><label>Show hero floats</label><input type="checkbox" id="tw-fl" checked/></div>
</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#00AEF7",
  "heroSize": 68,
  "cardRadius": 12,
  "navStyle": "glass",
  "floats": true
}/*EDITMODE-END*/;

// ── Lucide icon wrapper
const LI = ({ name, size = 18, color = 'currentColor', strokeWidth = 1.6 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      lucide.createIcons({ elements: [el] });
      const svg = ref.current.querySelector('svg');
      if (svg) { svg.setAttribute('width', size); svg.setAttribute('height', size); svg.setAttribute('stroke', color); svg.setAttribute('stroke-width', strokeWidth); }
    }
  }, [name, size, color]);
  return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center' }} />;
};

// ── SCROLL FADE
function useFade() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-section').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

// ── NAVBAR
function Navbar({ t, menuOpen, setMenuOpen }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 48);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  const bg = scrolled ? (t.navStyle === 'solid' ? '#fff' : t.navStyle === 'minimal' ? 'transparent' : 'rgba(250,250,250,0.85)') : 'transparent';
  const bd = scrolled ? '1px solid #EEEEEE' : 'none';
  const bf = scrolled && t.navStyle === 'glass' ? 'blur(18px) saturate(160%)' : 'none';
  const links = ['Services','Platform','Import Genius','Why Us','Pricing','Contact'];
  return (
    <nav style={{ position:'fixed', top:0, left:0, right:0, zIndex:100, height:64, padding:'0 clamp(20px,5vw,80px)', display:'flex', alignItems:'center', justifyContent:'space-between', background:bg, backdropFilter:bf, borderBottom:bd, transition:'all 0.4s ease' }}>
      {/* Logo */}
      <a href="#hero" style={{ textDecoration:'none', display:'flex', alignItems:'center', gap:8 }}>
        <span style={{ fontFamily:'Bricolage Grotesque', fontWeight:700, fontSize:20, color:'#0A0A0A', letterSpacing:'-0.02em' }}>Zerox</span>
        <div style={{ width:7, height:7, borderRadius:'50%', background:t.accent, flexShrink:0, marginTop:1 }}/>
      </a>
      {/* Desktop */}
      <div className="nav-links" style={{ display:'flex', alignItems:'center', gap:28 }}>
        {links.map(l => (
          <a key={l} href={`#${l.toLowerCase().replace(' ','-')}`}
            style={{ color:'#4A5568', fontSize:14, textDecoration:'none', fontWeight:500, transition:'color 0.2s' }}
            onMouseEnter={e=>e.target.style.color='#0A0A0A'}
            onMouseLeave={e=>e.target.style.color='#4A5568'}>{l}</a>
        ))}
        <a href="#contact" style={{ background:'#0A0A0A', color:'#fff', padding:'9px 20px', borderRadius:8, fontSize:13, fontWeight:600, textDecoration:'none', transition:'opacity 0.2s, transform 0.2s', letterSpacing:'-0.01em' }}
          onMouseEnter={e=>{e.currentTarget.style.opacity='0.82';e.currentTarget.style.transform='translateY(-1px)';}}
          onMouseLeave={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.transform='none';}}>Book a Call</a>
      </div>
      {/* Hamburger */}
      <button onClick={()=>setMenuOpen(!menuOpen)} className="hamburger" style={{ display:'none', background:'none', border:'none', cursor:'pointer', padding:4 }}>
        <LI name={menuOpen?'x':'menu'} size={22} color="#0A0A0A"/>
      </button>
    </nav>
  );
}

function MobileMenu({ open, onClose, t }) {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:99, background:'#fff', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:28, transform:open?'translateX(0)':'translateX(100%)', transition:'transform 0.35s cubic-bezier(.77,0,.18,1)' }}>
      {['Services','Platform','Import Genius','Why Us','Pricing','Contact'].map(l=>(
        <a key={l} href={`#${l.toLowerCase().replace(' ','-')}`} onClick={onClose} style={{ fontFamily:'Bricolage Grotesque', fontWeight:700, fontSize:28, color:'#0A0A0A', textDecoration:'none' }}>{l}</a>
      ))}
      <a href="#contact" onClick={onClose} style={{ background:'#0A0A0A', color:'#fff', padding:'13px 34px', borderRadius:10, fontSize:16, fontWeight:600, textDecoration:'none', marginTop:8 }}>Book a Call</a>
    </div>
  );
}

// ── ORDER DASHBOARD MOCK
function OrderDashboard({ accent }) {
  const [orders, setOrders] = useState([
    { id:'#4021', store:'Aarong Lifestyle', amount:'৳ 2,340', status:'New', time:'just now', courier:'Pathao' },
    { id:'#4020', store:'Meena Bazar Online', amount:'৳ 890', status:'Processing', time:'2m ago', courier:'Steadfast' },
    { id:'#4019', store:'Shajgoj', amount:'৳ 1,650', status:'Shipped', time:'5m ago', courier:'RedX' },
    { id:'#4018', store:'Chaldal', amount:'৳ 4,200', status:'Delivered', time:'12m ago', courier:'Pathao' },
    { id:'#4017', store:'Daraz BD', amount:'৳ 760', status:'Processing', time:'18m ago', courier:'Steadfast' },
  ]);

  const statusStyle = s => {
    if (s==='New') return { color:'#1D4ED8', bg:'#EFF6FF', border:'#BFDBFE' };
    if (s==='Processing') return { color:'#B45309', bg:'#FFFBEB', border:'#FDE68A' };
    if (s==='Shipped') return { color:'#6D28D9', bg:'#F5F3FF', border:'#DDD6FE' };
    return { color:'#15803D', bg:'#F0FDF4', border:'#BBF7D0' };
  };

  // Animate a new order in every 3.5s
  useEffect(() => {
    const newOrders = [
      { id:'#4022', store:'Bikroy.com', amount:'৳ 3,100', status:'New', time:'just now', courier:'RedX' },
      { id:'#4023', store:'Shajgoj', amount:'৳ 560', status:'New', time:'just now', courier:'Pathao' },
      { id:'#4024', store:'Aarong Lifestyle', amount:'৳ 1,875', status:'New', time:'just now', courier:'Steadfast' },
    ];
    let idx = 0;
    const interval = setInterval(() => {
      const next = { ...newOrders[idx % newOrders.length], _new: true };
      setOrders(prev => [next, ...prev.slice(0, 4)]);
      idx++;
    }, 3500);
    return () => clearInterval(interval);
  }, []);

  const stats = [
    { label: 'Orders today', value: '247', icon: 'package', delta: '+12%' },
    { label: 'Revenue', value: '৳ 84K', icon: 'trending-up', delta: '+8%' },
    { label: 'Active couriers', value: '3', icon: 'truck', delta: '' },
  ];

  return (
    /* ── Browser chrome wrapper ── */
    <div style={{ background:'#fff', borderRadius:16, boxShadow:'0 32px 80px rgba(10,10,10,0.12), 0 2px 8px rgba(10,10,10,0.06)', border:'1px solid #E8ECF2', overflow:'hidden', width:'100%', maxWidth:520 }}>
      {/* Browser bar */}
      <div style={{ background:'#F4F5F7', borderBottom:'1px solid #E8ECF2', padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ display:'flex', gap:6 }}>
          {['#FF5F57','#FEBC2E','#28C840'].map(c=><div key={c} style={{ width:10, height:10, borderRadius:'50%', background:c }}/>)}
        </div>
        <div style={{ flex:1, background:'#fff', borderRadius:6, border:'1px solid #E2E6EF', padding:'4px 12px', display:'flex', alignItems:'center', gap:6 }}>
          <LI name="lock" size={10} color="#8896A5" strokeWidth={2}/>
          <span style={{ fontSize:11, color:'#8896A5', fontWeight:500 }}>app.zerox.com.bd/orders</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:5, background:`${accent}12`, border:`1px solid ${accent}30`, borderRadius:20, padding:'3px 9px' }}>
          <div style={{ width:6, height:6, borderRadius:'50%', background:'#22C55E', position:'relative' }}>
            <div style={{ position:'absolute', inset:-2, borderRadius:'50%', background:'#22C55E', opacity:0.4, animation:'ping 1.6s ease-out infinite' }}/>
          </div>
          <span style={{ fontSize:10, color:accent, fontWeight:700 }}>LIVE</span>
        </div>
      </div>

      {/* Dashboard interior */}
      <div style={{ background:'#F8F9FC', padding:'0' }}>
        {/* Sidebar + main layout */}
        <div style={{ display:'flex', height:360 }}>
          {/* Mini sidebar */}
          <div style={{ width:44, background:'#0A0A0A', display:'flex', flexDirection:'column', alignItems:'center', paddingTop:14, gap:14, flexShrink:0 }}>
            {['layout-grid','package','truck','bar-chart-2','settings'].map((ico,i)=>(
              <div key={ico} style={{ width:30, height:30, borderRadius:8, background: i===1?`${accent}25`:'transparent', display:'flex', alignItems:'center', justifyContent:'center' }}>
                <LI name={ico} size={14} color={i===1?accent:'rgba(255,255,255,0.3)'} strokeWidth={1.6}/>
              </div>
            ))}
          </div>

          {/* Main content */}
          <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
            {/* Top stat strip */}
            <div style={{ display:'flex', gap:0, borderBottom:'1px solid #EEEEEE', background:'#fff' }}>
              {stats.map((s,i)=>(
                <div key={s.label} style={{ flex:1, padding:'10px 14px', borderRight: i<2?'1px solid #EEEEEE':'none' }}>
                  <div style={{ fontSize:10, color:'#8896A5', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:3 }}>{s.label}</div>
                  <div style={{ display:'flex', alignItems:'baseline', gap:5 }}>
                    <span style={{ fontFamily:'Bricolage Grotesque', fontSize:18, fontWeight:800, color:'#0A0A0A', letterSpacing:'-0.03em' }}>{s.value}</span>
                    {s.delta && <span style={{ fontSize:10, color:'#16A34A', fontWeight:700 }}>{s.delta}</span>}
                  </div>
                </div>
              ))}
            </div>

            {/* Order table header */}
            <div style={{ padding:'10px 14px 6px', background:'#fff', borderBottom:'1px solid #F0F1F3' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <span style={{ fontFamily:'Bricolage Grotesque', fontSize:13, fontWeight:700, color:'#0A0A0A' }}>Live Orders</span>
                  <span style={{ fontSize:10, color:'#8896A5', fontWeight:500 }}>Round-robin active</span>
                </div>
                <div style={{ display:'flex', gap:6 }}>
                  {['Pathao','Steadfast','RedX'].map(c=>(
                    <span key={c} style={{ fontSize:9, color:'#4A5568', background:'#F0F1F5', borderRadius:4, padding:'2px 6px', fontWeight:600 }}>{c}</span>
                  ))}
                </div>
              </div>
            </div>

            {/* Order rows */}
            <div style={{ flex:1, overflowY:'hidden', background:'#fff' }}>
              {orders.map((o, i) => {
                const st = statusStyle(o.status);
                return (
                  <div key={o.id+i} style={{
                    display:'flex', alignItems:'center', gap:8, padding:'7px 14px',
                    borderBottom:'1px solid #F5F6F8',
                    background: o._new && i===0 ? `${accent}06` : '#fff',
                    transition:'background 0.5s ease',
                    animation: o._new && i===0 ? 'newRow 0.4s ease both' : 'none',
                  }}>
                    <div style={{ width:7, height:7, borderRadius:'50%', background: o.status==='New'?accent:'#E2E6EF', flexShrink:0 }}/>
                    <span style={{ fontFamily:'Bricolage Grotesque', fontSize:11, fontWeight:700, color:'#4A5568', minWidth:38 }}>{o.id}</span>
                    <span style={{ fontSize:11, color:'#0A0A0A', flex:1, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{o.store}</span>
                    <span style={{ fontSize:11, fontWeight:700, color:'#0A0A0A', minWidth:58, textAlign:'right' }}>{o.amount}</span>
                    <span style={{ fontSize:9, fontWeight:700, color:st.color, background:st.bg, border:`1px solid ${st.border}`, borderRadius:20, padding:'2px 7px', whiteSpace:'nowrap' }}>{o.status}</span>
                    <span style={{ fontSize:9, color:'#8896A5', minWidth:48 }}>{o.courier}</span>
                    <span style={{ fontSize:9, color:'#C4CDD6', minWidth:40, textAlign:'right' }}>{o.time}</span>
                  </div>
                );
              })}
            </div>

            {/* Footer strip */}
            <div style={{ padding:'8px 14px', background:'#F8F9FC', borderTop:'1px solid #EEEEEE', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontSize:10, color:'#8896A5' }}>Showing 5 of 247 orders</span>
              <div style={{ display:'flex', alignItems:'center', gap:5 }}>
                <div style={{ width:5, height:5, borderRadius:'50%', background:accent, animation:'ping 1.8s ease-out infinite', opacity:0.8 }}/>
                <span style={{ fontSize:10, color:accent, fontWeight:600 }}>Streaming via Socket</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      {/* Video placeholder note — replace with <video> or <iframe> */}
      {/* <video autoPlay muted loop playsInline style={{width:'100%'}} src="your-demo.mp4"/> */}
    </div>
  );
}

// ── HERO
function Hero({ t }) {
  const [drawn, setDrawn] = useState(false);
  const [wordsShown, setWordsShown] = useState(0);
  const headline = "We don't just support your ecommerce — we guarantee growth";
  const words = headline.split(' ');

  useEffect(() => {
    let i = 0;
    const interval = setInterval(() => {
      i++;
      setWordsShown(i);
      if (i >= words.length) clearInterval(interval);
    }, 55);
    setTimeout(() => setDrawn(true), 900);
    return () => clearInterval(interval);
  }, []);

  return (
    <section id="hero" style={{ position:'relative', minHeight:'100vh', display:'flex', alignItems:'center', padding:'96px clamp(20px,5vw,72px) 72px', overflow:'hidden', background:'linear-gradient(160deg,#FAFAFA 0%,#F2F5FA 100%)' }}>
      {/* Grid bg */}
      <div style={{ position:'absolute', inset:0, backgroundImage:`radial-gradient(circle, rgba(10,15,40,0.04) 1px, transparent 1px)`, backgroundSize:'36px 36px', maskImage:'radial-gradient(ellipse 80% 80% at 50% 50%, black 10%, transparent 100%)' }}/>

      {/* Split layout */}
      <div style={{ position:'relative', zIndex:2, width:'100%', maxWidth:1280, margin:'0 auto', display:'grid', gridTemplateColumns:'1fr 1fr', gap:'clamp(32px,5vw,72px)', alignItems:'center' }} className="hero-split">

        {/* LEFT — content */}

// ── APP
function App() {
  const [t, setT] = useState(TWEAK_DEFAULTS);
  const [menuOpen, setMenuOpen] = useState(false);
  useFade();

  useEffect(() => {
    const panel = document.getElementById('tweak-panel');
    const handler = e => {
      if (e.data?.type==='__activate_edit_mode') panel.classList.add('open');
      if (e.data?.type==='__deactivate_edit_mode') panel.classList.remove('open');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');

    const wire = (id, key, parse) => {
      const el = document.getElementById(id); if (!el) return;
      el.value = t[key]; if (el.type==='checkbox') el.checked = t[key];
      el.addEventListener(el.type==='range'||el.type==='color'?'input':'change', e=>{
        const v = parse ? parse(e.target.value) : (el.type==='checkbox'?e.target.checked:e.target.value);
        setT(prev=>({...prev,[key]:v}));
        window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[key]:v}},'*');
      });
    };
    wire('tw-accent','accent',null);
    wire('tw-hs','heroSize',Number);
    wire('tw-cr','cardRadius',Number);
    wire('tw-nav','navStyle',null);
    wire('tw-fl','floats',null);
    return () => window.removeEventListener('message', handler);
  }, []);

  // Reinit Lucide after render
  useEffect(() => { if (window.lucide) lucide.createIcons(); });

  return (
    <>
      <style>{`
        @keyframes ping { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(2.2);opacity:0} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes blob { 0%,100%{border-radius:60% 40% 54% 46%/48% 56% 44% 52%;transform:translate(0,0) scale(1)} 50%{border-radius:45% 55% 40% 60%/60% 40% 58% 42%;transform:translate(16px,-18px) scale(1.04)} }
        @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
        @keyframes newRow { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
        @media (max-width: 960px) { .hero-split { grid-template-columns: 1fr !important; } }
        @media (max-width: 768px) {
          .nav-links { display: none !important; }
          .hamburger { display: flex !important; }
          .bento-grid { grid-template-columns: 1fr !important; }
          .bento-grid > div { grid-column: span 1 !important; }
          .import-layout { grid-template-columns: 1fr !important; gap: 40px !important; }
          .footer-cols { grid-template-columns: 1fr 1fr !important; }
          .testimonial-grid { grid-template-columns: 1fr !important; }
        }
        @media (max-width: 480px) { .footer-cols { grid-template-columns: 1fr !important; } .stats-row { flex-direction: column; gap: 16px !important; } }
      `}</style>
      <Navbar t={t} menuOpen={menuOpen} setMenuOpen={setMenuOpen}/>
      <MobileMenu open={menuOpen} onClose={()=>setMenuOpen(false)} t={t}/>
      <Hero t={t}/>
      <Services t={t}/>
      <Platform t={t}/>
      <ImportGenius t={t}/>
      <WhyZerox t={t}/>
      <Testimonials t={t}/>
      <Pricing t={t}/>
      <CtaFooter t={t}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
